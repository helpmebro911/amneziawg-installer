name: Feature Request
description: Suggest a new feature or enhancement
labels: [enhancement]

body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Client management
        - Installation
        - Security
        - Performance
        - Documentation
        - Other
    validations:
      required: false

  - type: textarea
    id: problem-motivation
    attributes:
      label: Problem / Motivation
      description: Describe the problem you're trying to solve or the motivation behind this request.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.
    validations:
      required: false
